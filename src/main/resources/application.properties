spring.application.name=shms

# ── Port ──────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# ── DataSource ────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/shms_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Jakarta
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ── JWT ───────────────────────────────────────────────────────
# Ganti dengan env var di production! Minimal 32 karakter
jwt.secret=${JWT_SECRET:shms_super_secret_key_must_be_32chars_xxx}
jwt.expiration=86400000

# ── AES Encryption ────────────────────────────────────────────
# 16 karakter = AES-128 | Ganti di production
encryption.key=${ENCRYPTION_KEY:shms_enc_key_16c!}

# ── Upload ────────────────────────────────────────────────────
upload.path=./uploads/shms/
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# ── Session management ────────────────────────────────────────
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ── Security Headers ──────────────────────────────────────────
server.error.include-stacktrace=never
server.error.include-message=never

# ── Actuator (nonaktif di production) ────────────────────────
management.endpoints.enabled-by-default=false


