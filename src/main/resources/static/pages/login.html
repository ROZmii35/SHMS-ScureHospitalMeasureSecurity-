<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In - MedClinic</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>M</text></svg>" />
  <script type="module" crossorigin src="/assets/login-C-8Tpc5B.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/auth-B4AlU-wO.js">
  <link rel="stylesheet" crossorigin href="/assets/auth-BCh_zKyI.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-left">
      <div class="auth-left-content">
        <h1>Welcome Back</h1>
        <p>Sign in to access your clinic dashboard, manage patients, and track appointments.</p>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-form-wrapper">
        <h2>Sign In</h2>
        <p class="auth-subtitle">Enter your credentials to access your account</p>

        <div class="auth-error" id="auth-error"></div>

        <form id="login-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" class="form-input" placeholder="you@example.com" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" required />
          </div>
          <button type="submit" class="btn btn-primary" id="submit-btn">Sign In</button>
        </form>

        <div class="auth-footer">
          Don't have an account? <a href="/pages/register.html">Create one</a>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
